<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Vault | XrenBeats.com</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .vault-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        .auth-box, .app-box {
            display: none;
        }

        .auth-box.active, .app-box.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: transparent; color: var(--text-muted); text-decoration: underline; margin-top: 10px;}
        
        .user-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #475569;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .upload-section {
            border: 2px dashed #475569;
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .upload-section:hover { border-color: var(--accent-color); }
        #file-input { display: none; }

        .audio-item {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .audio-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .audio-title { font-weight: 600; word-break: break-all; padding-right: 10px;}
        
        .actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-download { background-color: #10b981; color: white; }
        .btn-delete { background-color: #ef4444; color: white; }

        audio { width: 100%; }
        .status-msg { text-align: center; color: var(--accent-color); margin: 10px 0; font-weight: 500; }
        .error-msg { color: #ef4444 !important; }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="auth-container" class="auth-box active">
        <h2 id="auth-title">Create Account</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="auth-submit-btn">Sign Up</button>
        <button class="btn btn-secondary" id="auth-toggle-btn">Already have an account? Log In</button>
        <p class="status-msg error-msg" id="auth-error"></p>
    </div>

    <div id="app-container" class="app-box">
        <div class="user-banner">
            <span id="user-display">Loading user...</span>
            <button class="logout-btn" id="logout-btn">Log Out</button>
        </div>

        <h1>Cloud Identity Audio Vault</h1>

        <div class="upload-section" onclick="document.getElementById('file-input').click()">
            <p style="margin:0 0 10px 0;">Select or Drop Audio File (Up to 100MB)</p>
            <input type="file" id="file-input" accept="audio/*">
            <button class="btn btn-primary" style="width:auto; display:inline-block;">Browse Local Files</button>
        </div>

        <div id="upload-status" class="status-msg"></div>

        <h3>Your Local Account Tracks</h3>
        <div id="audio-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCF2bIrdhtljSGaBOfdJ_wnMwHegqq94Bk",
        authDomain: "xrenbeats-vault.firebaseapp.com",
        projectId: "xrenbeats-vault",
        storageBucket: "xrenbeats-vault.firebasestorage.app",
        messagingSenderId: "52906720796",
        appId: "1:52906720796:web:65f2a3484b420ff518e9d9",
        measurementId: "G-RE05QTMTPV"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Database Setup
    let db = null;
    const dbName = "HybridAudioVaultDB";
    const storeName = "user_tracks";
    let isSignUpMode = true;
    let currentUser = null;

    // Elements
    const authContainer = document.getElementById('auth-container');
    const appContainer = document.getElementById('app-container');
    const authTitle = document.getElementById('auth-title');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const authToggleBtn = document.getElementById('auth-toggle-btn');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authError = document.getElementById('auth-error');
    const userDisplay = document.getElementById('user-display');
    const logoutBtn = document.getElementById('logout-btn');
    const fileInput = document.getElementById('file-input');
    const uploadStatus = document.getElementById('upload-status');
    const audioList = document.getElementById('audio-list');

    // Open Native Database
    const dbRequest = indexedDB.open(dbName, 1);
    dbRequest.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains(storeName)) {
            // Setup keys and indexes so we can search entries matching user fields
            const store = db.createObjectStore(storeName, { keyPath: "id" });
            store.createIndex("userId", "userId", { unique: false });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        if(currentUser) loadUserTracks();
    };

    // --- AUTHENTICATION UI CONTROL ---
    authToggleBtn.addEventListener('click', () => {
        isSignUpMode = !isSignUpMode;
        authTitle.innerText = isSignUpMode ? "Create Account" : "Welcome Back";
        authSubmitBtn.innerText = isSignUpMode ? "Sign Up" : "Log In";
        authToggleBtn.innerText = isSignUpMode ? "Already have an account? Log In" : "Need an account? Sign Up";
        authError.innerText = "";
    });

    authSubmitBtn.addEventListener('click', async () => {
        const email = authEmail.value;
        const password = authPassword.value;
        authError.innerText = "Processing...";
        try {
            if (isSignUpMode) {
                await createUserWithEmailAndPassword(auth, email, password);
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }
            authError.innerText = "";
        } catch (error) {
            authError.innerText = error.message.replace("Firebase: ", "");
        }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userDisplay.innerText = user.email;
            authContainer.classList.remove('active');
            appContainer.classList.add('active');
            if (db) loadUserTracks();
        } else {
            currentUser = null;
            appContainer.classList.remove('active');
            authContainer.classList.add('active');
            audioList.innerHTML = '';
        }
    });

    // --- TRACK STORAGE LOGIC ---
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file || !currentUser) return;

        const maxBytes = 100 * 1024 * 1024; // 100MB
        if (file.size > maxBytes) {
            alert("File is too large! Maximum limit is 100MB.");
            fileInput.value = '';
            return;
        }

        uploadStatus.innerText = "Securing file into account library profile...";

        const record = {
            id: Date.now().toString(),
            userId: currentUser.uid, // Ties the file strictly to the logged-in user context
            name: file.name,
            type: file.type,
            fileBlob: file
        };

        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.add(record);

        transaction.oncomplete = function() {
            uploadStatus.innerText = "Saved successfully!";
            fileInput.value = '';
            setTimeout(() => { uploadStatus.innerText = ""; }, 2000);
            loadUserTracks();
        };
        transaction.onerror = function() {
            uploadStatus.innerText = "Database storage execution error.";
        };
    });

    // Load files tied only to the current user's UID
    function loadUserTracks() {
        audioList.innerHTML = '';
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const index = store.index("userId");
        const query = index.getAll(currentUser.uid); // Filter items matching uid only

        query.onsuccess = function() {
            const tracks = query.result;
            if (tracks.length === 0) {
                audioList.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-style:italic;">Your vault collection is empty.</p>';
                return;
            }

            tracks.forEach(track => {
                const blobUrl = URL.createObjectURL(track.fileBlob);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'audio-item';
                itemDiv.innerHTML = `
                    <div class="audio-info">
                        <span class="audio-title">${track.name}</span>
                        <div class="actions">
                            <button class="action-btn btn-download" data-id="${track.id}">Export</button>
                            <button class="action-btn btn-delete" data-id="${track.id}">Delete</button>
                        </div>
                    </div>
                    <audio controls src="${blobUrl}" preload="none"></audio>
                `;
                audioList.appendChild(itemDiv);
            });

            // Action mappings
            document.querySelectorAll('.btn-download').forEach(btn => {
                btn.onclick = (e) => exportTrack(e.target.dataset.id);
            });
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = (e) => deleteTrack(e.target.dataset.id);
            });
        };
    }

    function exportTrack(id) {
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const req = store.get(id);

        req.onsuccess = function() {
            const track = req.result;
            if (!track) return;
            const url = URL.createObjectURL(track.fileBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = track.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    }

    function deleteTrack(id) {
        if (!confirm("Remove track permanently from account vault view?")) return;
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.delete(id);
        transaction.oncomplete = function() {
            loadUserTracks();
        };
    }
</script>

</body>
</html>

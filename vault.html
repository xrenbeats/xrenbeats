<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XrenBeats Audio Vault</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --e2ee-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .vault-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        .badge-e2ee {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--e2ee-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            margin-bottom: 15px;
        }

        .auth-box, .app-box {
            display: none;
        }

        .auth-box.active, .app-box.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: transparent; color: var(--text-muted); text-decoration: underline; margin-top: 10px;}
        
        .user-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #475569;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Fixed Clickable Area & Drag/Drop states */
        .upload-section {
            border: 2px dashed #475569;
            padding: 35px 25px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background 0.2s, border-color 0.2s;
            position: relative;
        }

        .upload-section.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #ef4444;
        }

        .upload-section.dragover {
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Invisible native element covering box space for guaranteed mobile trigger */
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            display: block;
        }

        .upload-section.disabled #file-input {
            cursor: not-allowed;
            pointer-events: none;
        }

        .audio-item {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .audio-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .audio-title { font-weight: 600; word-break: break-all; padding-right: 10px;}
        
        .actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-download { background-color: #10b981; color: white; }
        .btn-delete { background-color: #ef4444; color: white; }

        audio { width: 100%; }
        .status-msg { text-align: center; color: var(--accent-color); margin: 10px 0; font-weight: 500; }
        .error-msg { color: #ef4444 !important; }
        
        .secret-setup-box {
            background: #1e293b;
            border: 1px solid var(--e2ee-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="auth-container" class="auth-box active">
        <h2 id="auth-title">Create Account</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="auth-submit-btn">Sign Up</button>
        <button class="btn btn-secondary" id="auth-toggle-btn">Already have an account? Log In</button>
        <p class="status-msg error-msg" id="auth-error"></p>
    </div>

    <div id="app-container" class="app-box">
        <div class="user-banner">
            <span id="user-display">Loading...</span>
            <button class="logout-btn" id="logout-btn">Log Out</button>
        </div>

        <div style="text-align: center;">
            <span class="badge-e2ee">🔒 End-to-end encrypted </span>
        </div>

        <div class="secret-setup-box" id="secret-box">
            <label style="color: var(--e2ee-color); font-weight: bold;">Unlock Vault with Secret Key:</label>
            <p style="font-size: 0.8rem; margin: 4px 0 12px 0; color: var(--text-muted);">
                Enter your unique encryption phrase. This never leaves your device. If lost, your files may not be recoverable.
            </p>
            <div style="display: flex; gap: 10px;">
                <input type="password" id="vault-secret" placeholder="Enter your vault secret phrase...">
                <button class="btn btn-primary" id="btn-lock-secret" style="width: auto; white-space: nowrap; background: var(--e2ee-color);">Apply Key</button>
            </div>
        </div>

        <h1>Secure Audio Vault</h1>

        <div class="upload-section disabled" id="upload-zone">
            <p style="margin:0 0 10px 0;" id="upload-instruction">Unlock your vault with a secret key to upload tracks</p>
            <input type="file" id="file-input" accept="audio/*" disabled>
            <button class="btn btn-primary" id="browse-btn" style="width:auto; display:inline-block; pointer-events: none;" disabled>Browse Files</button>
        </div>

        <div id="upload-status" class="status-msg"></div>

        <h3>Your Encrypted Track Storage</h3>
        <div id="audio-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCF2bIrdhtljSGaBOfdJ_wnMwHegqq94Bk",
        authDomain: "xrenbeats-vault.firebaseapp.com",
        projectId: "xrenbeats-vault",
        storageBucket: "xrenbeats-vault.firebasestorage.app",
        messagingSenderId: "52906720796",
        appId: "1:52906720796:web:65f2a3484b420ff518e9d9",
        measurementId: "G-RE05QTMTPV"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let db = null;
    let cryptoKey = null;
    const dbName = "E2EEAudioVaultDB";
    const storeName = "secure_tracks";
    let isSignUpMode = true;
    let currentUser = null;

    const authContainer = document.getElementById('auth-container');
    const appContainer = document.getElementById('app-container');
    const authTitle = document.getElementById('auth-title');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const authToggleBtn = document.getElementById('auth-toggle-btn');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authError = document.getElementById('auth-error');
    const userDisplay = document.getElementById('user-display');
    const logoutBtn = document.getElementById('logout-btn');
    const fileInput = document.getElementById('file-input');
    const uploadStatus = document.getElementById('upload-status');
    const audioList = document.getElementById('audio-list');
    const vaultSecret = document.getElementById('vault-secret');
    const btnLockSecret = document.getElementById('btn-lock-secret');
    const uploadZone = document.getElementById('upload-zone');
    const uploadInstruction = document.getElementById('upload-instruction');
    const browseBtn = document.getElementById('browse-btn');

    const dbRequest = indexedDB.open(dbName, 1);
    dbRequest.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains(storeName)) {
            const store = db.createObjectStore(storeName, { keyPath: "id" });
            store.createIndex("userId", "userId", { unique: false });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        if(currentUser && cryptoKey) loadUserTracks();
    };

    async function deriveKey(secretText, saltText) {
        const encoder = new TextEncoder();
        const baseKey = await window.crypto.subtle.importKey(
            "raw", 
            encoder.encode(secretText), 
            { name: "PBKDF2" }, 
            false, 
            ["deriveKey"]
        );
        return window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: encoder.encode(saltText),
                iterations: 100000,
                hash: "SHA-256"
            },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    btnLockSecret.addEventListener('click', async () => {
        if(!vaultSecret.value.trim()) {
            alert("Please provide a valid custom secret key phrase.");
            return;
        }
        try {
            cryptoKey = await deriveKey(vaultSecret.value, currentUser.uid);
            
            uploadZone.classList.remove('disabled');
            fileInput.removeAttribute('disabled');
            browseBtn.removeAttribute('disabled');
            uploadInstruction.innerText = "Select, Drop, or Tap to Upload Audio (Up to 100MB)";
            
            vaultSecret.style.borderColor = "var(--e2ee-color)";
            btnLockSecret.innerText = "Key Synced";
            btnLockSecret.style.backgroundColor = "var(--e2ee-color)";
            
            loadUserTracks();
        } catch (e) {
            alert("Cryptographic computation initialization error.");
        }
    });

    // --- DRAG AND DROP HANDLERS ---
    ['dragenter', 'dragover'].forEach(eventName => {
        uploadZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (cryptoKey) uploadZone.classList.add('dragover');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            uploadZone.classList.remove('dragover');
        }, false);
    });

    uploadZone.addEventListener('drop', (e) => {
        if (!cryptoKey) return;
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length) {
            processFile(files[0]);
        }
    });

    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length) {
            processFile(e.target.files[0]);
        }
    });

    // Unified File Scrambler Function
    async function processFile(file) {
        if (!file || !currentUser || !cryptoKey) return;

        // Verify file mimetype context is audio
        if (!file.type.startsWith('audio/')) {
            alert("Invalid format. Please upload valid audio file types.");
            fileInput.value = '';
            return;
        }

        const maxBytes = 100 * 1024 * 1024; // 100MB
        if (file.size > maxBytes) {
            alert("File size limit warning! Max size allowed is 100MB.");
            fileInput.value = '';
            return;
        }

        uploadStatus.innerText = "Encrypting audio tracks on-the-fly using AES-256...";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            
            const encryptedData = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                cryptoKey,
                arrayBuffer
            );

            const record = {
                id: Date.now().toString(),
                userId: currentUser.uid,
                name: file.name,
                type: file.type,
                iv: iv,
                encryptedBlob: new Blob([encryptedData])
            };

            const transaction = db.transaction([storeName], "readwrite");
            const store = transaction.objectStore(storeName);
            store.add(record);

            transaction.oncomplete = function() {
                uploadStatus.innerText = "Encrypted file successfully secured!";
                fileInput.value = '';
                setTimeout(() => { uploadStatus.innerText = ""; }, 2500);
                loadUserTracks();
            };
        } catch (cryptoErr) {
            uploadStatus.innerText = "Encryption calculation failed.";
            console.error(cryptoErr);
            fileInput.value = '';
        }
    }

    // --- AUTHENTICATION LOGIC ---
    authToggleBtn.addEventListener('click', () => {
        isSignUpMode = !isSignUpMode;
        authTitle.innerText = isSignUpMode ? "Create Account" : "Welcome Back";
        authSubmitBtn.innerText = isSignUpMode ? "Sign Up" : "Log In";
        authToggleBtn.innerText = isSignUpMode ? "Already have an account? Log In" : "Need an account? Sign Up";
        authError.innerText = "";
    });

    authSubmitBtn.addEventListener('click', async () => {
        const email = authEmail.value;
        const password = authPassword.value;
        authError.innerText = "Processing...";
        try {
            if (isSignUpMode) {
                await createUserWithEmailAndPassword(auth, email, password);
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }
            authError.innerText = "";
        } catch (error) {
            authError.innerText = error.message.replace("Firebase: ", "");
        }
    });

    logoutBtn.addEventListener('click', () => {
        cryptoKey = null;
        vaultSecret.value = "";
        btnLockSecret.innerText = "Apply Key";
        btnLockSecret.style.backgroundColor = "var(--accent-color)";
        uploadZone.classList.add('disabled');
        fileInput.setAttribute('disabled', 'true');
        browseBtn.setAttribute('disabled', 'true');
        uploadInstruction.innerText = "Unlock your vault with a secret key to upload tracks";
        signOut(auth);
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userDisplay.innerText = user.email;
            authContainer.classList.remove('active');
            appContainer.classList.add('active');
            if (db && cryptoKey) loadUserTracks();
        } else {
            currentUser = null;
            appContainer.classList.remove('active');
            authContainer.classList.add('active');
            audioList.innerHTML = '';
        }
    });

    function loadUserTracks() {
        if(!cryptoKey || !currentUser) return;
        audioList.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Decrypting local profile files...</p>';
        
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const index = store.index("userId");
        const query = index.getAll(currentUser.uid);

        query.onsuccess = async function() {
            const tracks = query.result;
            audioList.innerHTML = '';

            if (tracks.length === 0) {
                audioList.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-style:italic;">Your encrypted vault collection is empty.</p>';
                return;
            }

            for (const track of tracks) {
                try {
                    const encryptedBuffer = await track.encryptedBlob.arrayBuffer();
                    const decryptedBuffer = await window.crypto.subtle.decrypt(
                        { name: "AES-GCM", iv: track.iv },
                        cryptoKey,
                        encryptedBuffer
                    );

                    const cleanBlob = new Blob([decryptedBuffer], { type: track.type });
                    const blobUrl = URL.createObjectURL(cleanBlob);

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'audio-item';
                    itemDiv.innerHTML = `
                        <div class="audio-info">
                            <span class="audio-title">🔒 ${track.name}</span>
                            <div class="actions">
                                <button class="action-btn btn-download" data-id="${track.id}">Export</button>
                                <button class="action-btn btn-delete" data-id="${track.id}">Delete</button>
                            </div>
                        </div>
                        <audio controls src="${blobUrl}" preload="none"></audio>
                    `;
                    audioList.appendChild(itemDiv);
                } catch (decryptError) {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'audio-item';
                    itemDiv.style.border = "1px solid #ef4444";
                    itemDiv.innerHTML = `
                        <div class="audio-info">
                            <span class="audio-title" style="color:#ef4444;">❌ Block Decryption Failure</span>
                            <button class="action-btn btn-delete" data-id="${track.id}">Delete</button>
                        </div>
                        <p style="font-size:0.75rem; color:var(--text-muted); margin:4px 0 0 0;">Could not unpack data blocks. The Applied Secret Key is invalid for this track.</p>
                    `;
                    audioList.appendChild(itemDiv);
                }
            }

            document.querySelectorAll('.btn-download').forEach(btn => {
                btn.onclick = (e) => exportTrack(e.target.dataset.id);
            });
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = (e) => deleteTrack(e.target.dataset.id);
            });
        };
    }

    async function exportTrack(id) {
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const req = store.get(id);

        req.onsuccess = async function() {
            const track = req.result;
            if (!track) return;
            try {
                const encryptedBuffer = await track.encryptedBlob.arrayBuffer();
                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: track.iv },
                    cryptoKey,
                    encryptedBuffer
                );
                const cleanBlob = new Blob([decryptedBuffer], { type: track.type });
                const url = URL.createObjectURL(cleanBlob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = track.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                alert("Export decryption authorization verification failed.");
            }
        };
    }

    function deleteTrack(id) {
        if (!confirm("Permanently erase encrypted block entry track from database?")) return;
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.delete(id);
        transaction.oncomplete = function() {
            loadUserTracks();
        };
    }
</script>

</body>
</html>

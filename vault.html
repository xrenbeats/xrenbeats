<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Audio Vault</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .vault-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        .auth-box, .app-box {
            display: none;
        }

        .auth-box.active, .app-box.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: transparent; color: var(--text-muted); text-decoration: underline; margin-top: 10px;}
        
        .user-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #475569;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .upload-section {
            border: 2px dashed #475569;
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .upload-section:hover { border-color: var(--accent-color); }
        #file-input { display: none; }

        .audio-item {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .audio-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .audio-title { font-weight: 600; word-break: break-all; }
        
        .actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-download { background-color: #10b981; color: white; }
        .btn-delete { background-color: #ef4444; color: white; }

        audio { width: 100%; }
        .status-msg { text-align: center; color: var(--accent-color); margin: 10px 0; }
    </style>
</head>
<body>

<div class="vault-container">
    <!-- 1. AUTHENTICATION INTERFACE -->
    <div id="auth-container" class="auth-box active">
        <h2 id="auth-title">Create Account</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="auth-submit-btn">Sign Up</button>
        <button class="btn btn-secondary" id="auth-toggle-btn">Already have an account? Log In</button>
        <p class="status-msg" id="auth-error"></p>
    </div>

    <!-- 2. VAULT INTERFACE (Hidden until logged in) -->
    <div id="app-container" class="app-box">
        <div class="user-banner">
            <span id="user-display">Loading user...</span>
            <button class="logout-btn" id="logout-btn">Log Out</button>
        </div>

        <h1>Cloud Audio Vault</h1>

        <div class="upload-section" onclick="document.getElementById('file-input').click()">
            <p style="margin:0 0 10px 0;">Select or Drop Audio File (Up to 50MB)</p>
            <input type="file" id="file-input" accept="audio/*">
            <button class="btn btn-primary" style="width:auto; display:inline-block;">Browse Cloud Upload</button>
        </div>

        <div id="upload-status" class="status-msg"></div>

        <h3>Your Cloud Tracks</h3>
        <div id="audio-list">
            <!-- Loaded cloud files will appear here -->
        </div>
    </div>
</div>

<!-- Firebase SDKs (v9 Compatible) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, listAll, getDownloadURL, deleteObject, getMetadata } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

   const firebaseConfig = {
  apiKey: "AIzaSyCF2bIrdhtljSGaBOfdJ_wnMwHegqq94Bk",
  authDomain: "xrenbeats-vault.firebaseapp.com",
  projectId: "xrenbeats-vault",
  storageBucket: "xrenbeats-vault.firebasestorage.app",
  messagingSenderId: "52906720796",
  appId: "1:52906720796:web:65f2a3484b420ff518e9d9",
  measurementId: "G-RE05QTMTPV"
};
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const storage = getStorage(app);

    // State Variables
    let isSignUpMode = true;
    let currentUser = null;

    // DOM Elements
    const authContainer = document.getElementById('auth-container');
    const appContainer = document.getElementById('app-container');
    const authTitle = document.getElementById('auth-title');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const authToggleBtn = document.getElementById('auth-toggle-btn');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authError = document.getElementById('auth-error');
    const userDisplay = document.getElementById('user-display');
    const logoutBtn = document.getElementById('logout-btn');
    const fileInput = document.getElementById('file-input');
    const uploadStatus = document.getElementById('upload-status');
    const audioList = document.getElementById('audio-list');

    // --- AUTHENTICATION LOGIC ---
    
    // Toggle between Sign Up and Login UI
    authToggleBtn.addEventListener('click', () => {
        isSignUpMode = !isSignUpMode;
        authTitle.innerText = isSignUpMode ? "Create Account" : "Welcome Back";
        authSubmitBtn.innerText = isSignUpMode ? "Sign Up" : "Log In";
        authToggleBtn.innerText = isSignUpMode ? "Already have an account? Log In" : "Need an account? Sign Up";
        authError.innerText = "";
    });

    // Handle Authentication Submission
    authSubmitBtn.addEventListener('click', async () => {
        const email = authEmail.value;
        const password = authPassword.value;
        authError.innerText = "Processing...";

        try {
            if (isSignUpMode) {
                await createUserWithEmailAndPassword(auth, email, password);
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }
            authError.innerText = "";
        } catch (error) {
            authError.innerText = error.message.replace("Firebase: ", "");
        }
    });

    // Handle Logout
    logoutBtn.addEventListener('click', () => signOut(auth));

    // Monitor Authentication State
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userDisplay.innerText = user.email;
            authContainer.classList.remove('active');
            appContainer.classList.add('active');
            loadCloudVault();
        } else {
            currentUser = null;
            appContainer.classList.remove('active');
            authContainer.classList.add('active');
            audioList.innerHTML = '';
        }
    });


    // --- STORAGE LOGIC ---

    // Handle File Uploads
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !currentUser) return;

        // Check if file exceeds the 50MB maximum you wanted
        const maxBytes = 50 * 1024 * 1024; // 50MB
        if (file.size > maxBytes) {
            alert("File is too large! Maximum allowed size is 50MB.");
            fileInput.value = '';
            return;
        }

        uploadStatus.innerText = "Uploading audio track to the cloud...";
        
        // Scope the storage pathway strictly to this user's UID
        const fileRef = ref(storage, `vaults/${currentUser.uid}/${Date.now()}_${file.name}`);

        try {
            await uploadBytes(fileRef, file);
            uploadStatus.innerText = "Upload successful!";
            fileInput.value = '';
            setTimeout(() => { uploadStatus.innerText = ""; }, 3000);
            loadCloudVault();
        } catch (error) {
            uploadStatus.innerText = "Upload failed.";
            console.error(error);
        }
    });

    // Fetch and Display files from the user's secure folder
    async function loadCloudVault() {
        audioList.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Syncing vault tracks...</p>';
        
        const listRef = ref(storage, `vaults/${currentUser.uid}`);
        
        try {
            const res = await listAll(listRef);
            if (res.items.length === 0) {
                audioList.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-style:italic;">Your cloud vault is empty.</p>';
                return;
            }

            audioList.innerHTML = ''; // Clear status loader

            // Loop through references and dynamically load data
            for (const itemRef of res.items) {
                const url = await getDownloadURL(itemRef);
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'audio-item';
                
                // Clean timestamp prefix from filenames for clean presentation
                const visibleName = itemRef.name.substring(itemRef.name.indexOf('_') + 1);

                itemDiv.innerHTML = `
                    <div class="audio-info">
                        <span class="audio-title">${visibleName}</span>
                        <div class="actions">
                            <button class="action-btn btn-download" data-url="${url}" data-name="${visibleName}">Export</button>
                            <button class="action-btn btn-delete" data-path="${itemRef.fullPath}">Delete</button>
                        </div>
                    </div>
                    <audio controls src="${url}" preload="none"></audio>
                `;
                audioList.appendChild(itemDiv);
            }

            // Bind click handlers to dynamically rendered actions
            document.querySelectorAll('.btn-download').forEach(btn => {
                btn.onclick = (e) => exportTrack(e.target.dataset.url, e.target.dataset.name);
            });
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = (e) => deleteTrack(e.target.dataset.path);
            });

        } catch (error) {
            audioList.innerHTML = '<p style="color:#ef4444;">Error syncing files from storage.</p>';
            console.error(error);
        }
    }

    // Export track helper (Forces browser package download)
    async function exportTrack(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        } catch (err) {
            alert("Export failed. Opening audio source fallback in new window instead.");
            window.open(url, '_blank');
        }
    }

    // Delete track helper
    async function deleteTrack(fullPath) {
        if (!confirm("Are you sure you want to permanently delete this file from your cloud vault?")) return;
        const fileRef = ref(storage, fullPath);
        try {
            await deleteObject(fileRef);
            loadCloudVault();
        } catch (error) {
            alert("Could not remove file.");
            console.error(error);
        }
    }
</script>

</body>
</html>

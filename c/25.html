<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJDoodleDoo's Official Soundboard</title>
    <style>
        /* Base Theme Fallbacks (Default: Dark/Slate) */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            margin: 10px 0;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* Controls / Secret Code Section */
        .controls-panel {
            background-color: var(--card-bg);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        select, input, .btn {
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        input {
            cursor: text;
        }

        .btn-accent {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-accent:hover {
            background-color: var(--accent-hover);
        }

        /* Sound Sections */
        .section-title {
            text-align: left;
            border-bottom: 2px solid var(--border);
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .sound-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 25px 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .sound-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .sound-card:active {
            transform: translateY(1px);
        }

        .global-actions {
            margin-top: 40px;
            width: 100%;
        }

        .stop-btn {
            width: 100%;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }

        .stop-btn:hover {
            background-color: #dc2626;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>DJDoodleDoo's Trash Studio</h1>
            <p>Custom Beats, Chaotic Noises, and Dynamic Themes</p>
        </header>

        <!-- Configuration Control Panel -->
        <div class="controls-panel">
            <label for="themeSelect">Theme:</label>
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="default">Default Dark</option>
                <option value="light">Plain Light</option>
                <option value="retro">8-Bit Arcade</option>
            </select>

            <div id="unlockContainer">
                <input type="text" id="secretCodeInput" placeholder="Enter Secret Code...">
                <button class="btn btn-accent" onclick="checkSecretCode()">Unlock Themes</button>
            </div>
        </div>

        <!-- Category 1: Trash Sounds -->
        <div class="section-title">🗑️ Trash Sounds</div>
        <div class="sound-grid">
            <!-- ADJUST THE FILE NAMES INSIDE THE playSound('') FUNCTION BELOW -->
            <button class="sound-card" onclick="playSound('audio/trash1.mp3')">Metal Bin Slam</button>

        <div class="sound-grid">
            <!-- ADJUST THESE TO MATCH YOUR ACTUAL MUSIC FILE NAMES -->
            <button class="sound-card" onclick="playSound('audio/trippylatin.mp3')">Trippy Latin Music For Babies to go to Sleep for.</button>
            <button class="sound-card" onclick="playSound('audio/ambitious.mp3')">Ambitius Taco Beieng</button>
            <button class="sound-card" onclick="playSound('audio/androidbeat.mp3')">ANDROID BEAT</button>
            <button class="sound-card" onclick="playSound('audio/bentrap.mp3')">BEN BEAT</button>
            <button class="sound-card" onclick="playSound('audio/highpitch.mp3')">High Pitch Eee!</button>
            <button class="sound-card" onclick="playSound('audio/goofyahhflanger.mp3')">Goofy Ahh Flanger #1</button>
            <button class="sound-card" onclick="playSound('audio/goofyahhflangerv2.mp3')">Goofy Ahh Flanger #2</button>
            <button class="sound-card" onclick="playSound('audio/alignment.mp3')">Alignment (Special Bing! :)</button>
            <button class="sound-card" onclick="playSound('audio/carhornbeat.mp3')">Car Horn Ahh Audio Beat</button>
        </div>

        <div class="global-actions">
            <button class="stop-btn" onclick="stopAllAudio()">⏹️ STOP ALL AUDIO</button>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        let activeAudioObjects = [];

        function playSound(audioFilePath) {
            // Creates a dynamic audio instance referencing your GitHub Pages directory structure
            const audio = new Audio(audioFilePath);
            activeAudioObjects.push(audio);
            
            audio.play().catch(error => {
                console.error("Audio failed to play. Check your file path or user interactions rules:", error);
                alert("Could not load file: " + audioFilePath + "\nMake sure it is uploaded to your 'audio' folder exactly with this filename!");
            });

            // Clean up reference when sound finishes
            audio.onended = () => {
                activeAudioObjects = activeAudioObjects.filter(item => item !== audio);
            };
        }

        function stopAllAudio() {
            activeAudioObjects.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            activeAudioObjects = [];

        function changeTheme(themeKey) {
            const selected = themeMap[themeKey] || themeMap.default;
            const root = document.documentElement;
            
            // Dynamically rewrite CSS injection variables
            root.style.setProperty('--bg', selected.bg);
            root.style.setProperty('--card-bg', selected.cardBg);
            root.style.setProperty('--text', selected.text);
            root.style.setProperty('--accent', selected.accent);
            root.style.setProperty('--accent-hover', selected.accentHover);
            root.style.setProperty('--border', selected.border);
        }

        // --- SECRET EASTER EGG METHOD ---
        function checkSecretCode() {
            const inputVal = document.getElementById('secretCodeInput').value.trim();
            const selectEl = document.getElementById('themeSelect');
            
            if (inputVal === "NOTSECRET1234") {
                // Remove the lock panel UI element entirely
                document.getElementById('unlockContainer').classList.add('hidden');
                
                // Array elements to dynamically push into select option nodes

                    { value: 'crimson', label: '🩸 Blood Crimson' },

                ];

                premiumOptions.forEach(opt => {
                    const el = document.createElement('option');
                    el.value = opt.value;
                    el.textContent = opt.label;
                    selectEl.appendChild(el);
                });

                alert("🔓 Access granted! 26 premium design engines unlocked.");
            } else {
                alert("❌ Verification signature failed.");
            }
        }
    </script>

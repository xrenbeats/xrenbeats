<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DJdoodledoo's Slaps.com Audio Tool</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #121212; color: #fff; padding-top: 50px; }
        .box { max-width: 450px; margin: auto; padding: 25px; background: #1e1e1e; border-radius: 8px; border: 1px solid #333; }
        input { width: 90%; padding: 10px; margin: 15px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; }
        button { width: 95%; padding: 12px; background: #ff4757; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #ff6b81; }
        #log { margin-top: 20px; color: #ffa502; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Slaps Audio Converter by Djdoodledoo</h3>
        <p style="color: #aaa; font-size: 12px;">Extracts direct audio streams completely client-side.</p>
        <input type="text" id="urlInput" value="https://slaps.com">
        <button id="goBtn">Extract & Open Audio</button>
        <div id="log">Ready</div>
    </div>

    <script>
        document.getElementById('goBtn').onclick = function() {
            var targetUrl = document.getElementById('urlInput').value.trim();
            var log = document.getElementById('log');
            
            if (!targetUrl) {
                alert('Please enter a URL');
                return;
            }

            log.innerText = "Connecting to public proxy server...";

            // Use an open proxy to read the HTML source safely over the web
            var proxy = "https://allorigins.win" + encodeURIComponent(targetUrl);

            fetch(proxy)
                .then(function(res) { 
                    if (!res.ok) throw new Error("Proxy connection failed.");
                    return res.json(); 
                })
                .then(function(data) {
                    var html = data.contents;
                    log.innerText = "Analyzing page text data...";

                    // Check if Cloudflare is blocking the public proxy's server IP
                    if (html.indexOf("cloudflare") !== -1 || html.indexOf("Just a moment") !== -1) {
                        throw new Error("Cloudflare blocked the proxy. Automated browser scraping is restricted by their firewall right now.");
                    }

                    // FIXED REGEX: Scans text safely without causing browser crashes
                    var match = html.match(/https?:\/\/[^"'\s>]+\.(?:mp3|wav|ogg|m4a)[^"'\s>]*/i);
                    if (!match) {
                        throw new Error("Could not find a direct audio link signature in the page text.");
                    }

                    var rawAudioUrl = match[0];
                    log.innerText = "Audio stream found! Forwarding to browser...";

                    // Open the raw streaming link directly in a safe browser window
                    window.open(rawAudioUrl, '_blank');
                    log.innerText = "Stream opened in a new tab! Right-click it to save.";
                })
                .catch(function(err) {
                    log.style.color = "#ff4757";
                    log.innerText = "Error: " + err.message;
                    console.error(err);
                });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♂️ Secret Audio Extractor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; background-color: #121212; color: #fff; padding-top: 60px; }
        .box { max-width: 480px; margin: auto; padding: 30px; background: #1a1a1a; border-radius: 12px; border: 1px solid #2e2e2e; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #262626; color: #fff; border: 1px solid #3a3a3a; border-radius: 6px; font-size: 14px; }
        button { width: 95%; padding: 14px; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 15px; transition: background 0.2s; }
        .btn-fetch { background: #3867d6; }
        .btn-fetch:hover { background: #4b7bec; }
        .btn-ready { background: #10ac84; animation: pulse 1.5s infinite; }
        .btn-ready:hover { background: #1dd1a1; }
        #log { margin-top: 20px; color: #fa8231; font-size: 13px; font-weight: 500; line-height: 1.4; white-space: pre-line; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="box">
        <h3>Secret Audio Extractor</h3>
        <p style="color: #888; font-size: 12px; margin-top: -10px;">Bypasses Client-Side Hydration & Popup Blockers</p>
        
        <input type="text" id="urlInput" value="https://slaps.com" placeholder="Paste slaps.com track URL">
        <button id="actionBtn" class="btn-fetch">Extract Audio Source</button>
        
        <div id="log">Enter a track URL to begin.</div>
    </div>

    <script>
        var extractedAudioUrl = ""; 
        var actionBtn = document.getElementById('actionBtn');
        var log = document.getElementById('log');

        actionBtn.onclick = function() {
            // STEP 2: If the link is already cached, execute a true user-interaction download link instantly
            if (extractedAudioUrl) {
                var downloader = document.createElement('a');
                downloader.href = extractedAudioUrl;
                downloader.target = "_blank";
                downloader.download = "extracted_audio.mp3"; 
                document.body.appendChild(downloader);
                downloader.click();
                downloader.remove();
                
                log.style.color = "#10ac84";
                log.innerText = "Audio stream opened in browser player tab!";
                return;
            }

            // STEP 1: Scan and parse the HTML layout structures asynchronously
            var targetUrl = document.getElementById('urlInput').value.trim();
            if (!targetUrl) return alert('Please input a URL first.');

            actionBtn.disabled = true;
            log.style.color = "#fa8231";
            log.innerText = "Routing request through a dedicated client proxy tunnel...";

            // Use an alternative proxy endpoint specifically tuned to skip security flags
            var proxyUrl = "https://corsproxy.io?" + encodeURIComponent(targetUrl);

            fetch(proxyUrl)
                .then(function(res) {
                    if (!res.ok) throw new Error("The network proxy failed to connect to the target website.");
                    return res.text();
                })
                .then(function(htmlText) {
                    log.innerText = "Target page retrieved!\nDehydrating Next.js application JSON state layer...";

                    if (htmlText.indexOf("cloudflare") !== -1 || htmlText.indexOf("Just a moment") !== -1) {
                        throw new Error("Cloudflare blocked the browser request.\nThe site's firewall is restricting automated actions right now.");
                    }

                    // Extract the specific dehydrated internal JSON data structure 
                    var markerStart = '<script id="__NEXT_DATA__" type="application/json">';
                    var indexStart = htmlText.indexOf(markerStart);
                    if (indexStart === -1) throw new Error("Could not parse page framework state container metadata.");

                    var dataStart = indexStart + markerStart.length;
                    var dataEnd = htmlText.indexOf('<\/script>', dataStart);
                    var jsonString = htmlText.substring(dataStart, dataEnd);
                    
                    var parsedPayload = JSON.parse(jsonString);

                    // Drill directly past client-side rendering into the raw API model node
                    var trackObj = parsedPayload.props.pageProps.track;
                    var cdnStreamUrl = trackObj.audio_url || trackObj.source_url;

                    if (!cdnStreamUrl) throw new Error("Extracted track state payload does not point to a valid audio resource file path.");

                    // Cache the source URL locally inside the webpage memory
                    extractedAudioUrl = cdnStreamUrl;

                    // Alter UI to prepare for safe, user-triggered click download action
                    actionBtn.disabled = false;
                    actionBtn.className = "btn-ready";
                    actionBtn.innerText = "🔥 Download Audio File Now";
                    
                    log.style.color = "#10ac84";
                    log.innerText = "Success! Source link extracted safely without triggering popup blocks.\nClick the button again to view or save your audio file.";
                })
                .catch(function(err) {
                    actionBtn.disabled = false;
                    log.style.color = "#ee5253";
                    log.innerText = "Execution Halted: " + err.message;
                    console.error(err);
                });
        };

        // Reset state instantly if user alters the target text entry line
        document.getElementById('urlInput').oninput = function() {
            extractedAudioUrl = "";
            actionBtn.className = "btn-fetch";
            actionBtn.innerText = "Extract Audio Source";
            log.style.color = "#fa8231";
            log.innerText = "Link changed. Ready to re-extract.";
        };
    </script>
</body>
</html>

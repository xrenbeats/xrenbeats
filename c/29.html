<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Built with Xren Studio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #121212; color: #fff; margin-top: 50px; }
        .container { max-width: 600px; margin: auto; padding: 30px; background: #1e1e1e; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input[type="text"] { width: 90%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 14px; }
        select { padding: 12px; margin: 10px; border-radius: 6px; background: #2a2a2a; color: #fff; border: 1px solid #333; cursor: pointer; }
        button { padding: 12px 25px; font-size: 16px; background-color: #ff4757; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #ff6b81; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #status { margin-top: 20px; color: #ffa502; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Slaps.com URL Audio Converter</h2>
        <p style="color: #aaa; font-size: 14px;">Convert track URLs into your preferred format directly in your browser.</p>
        
        <input type="text" id="trackUrl" placeholder="Paste slaps.com track URL here (e.g., https://slaps.com...)">
        <br>
        
        <label for="formatSelect">Choose Format: </label>
        <select id="formatSelect">
            <option value="mp3">MP3 (Compressed / High Compatibility)</option>
            <option value="wav">WAV (Uncompressed / High Quality)</option>
        </select>
        <br><br>
        
        <button id="convertBtn" disabled>Loading Converter Engine...</button>
        <div id="status">Initializing FFmpeg library...</div>
    </div>

    <!-- Load FFmpeg.wasm from an open-source CDN -->
    <script src="https://cloudflare.com"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        const trackUrlInput = document.getElementById('trackUrl');
        const formatSelect = document.getElementById('formatSelect');

        // Initialize FFmpeg WebAssembly on page load
        async function initFFmpeg() {
            try {
                await ffmpeg.load();
                statusDiv.innerText = "Converter engine ready!";
                convertBtn.innerText = "Fetch & Convert Audio";
                convertBtn.disabled = false;
            } catch (err) {
                statusDiv.style.color = "#ff4757";
                statusDiv.innerText = "Failed to load engine. Please ensure you are hosting this file via a web server.";
                console.error(err);
            }
        }
        initFFmpeg();

        convertBtn.addEventListener('click', async () => {
            const urlInput = trackUrlInput.value.trim();
            if (!urlInput) {
                alert('Please enter a valid URL!');
                return;
            }

            const targetFormat = formatSelect.value;
            convertBtn.disabled = true;
            statusDiv.innerText = "Scraping page audio source...";

            try {
                // 1. Fetch page data via a public CORS proxy to bypass security blocks
                const proxyUrl = "https://allorigins.win" + encodeURIComponent(urlInput);
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // 2. Parse the HTML text looking for raw audio CDN source paths (.mp3/.wav links)
                const htmlText = data.contents;
                const audioUrlMatch = htmlText.match(/https?:\/\/[^"'\s>]+\.(?:mp3|wav|ogg|m4a)[^"'\s>]*+/i);
                
                if (!audioUrlMatch) {
                    throw new Error("Could not detect a direct audio source URL on that page. Make sure the link points to a public track.");
                }

                const directAudioUrl = audioUrlMatch[0];
                statusDiv.innerText = "Downloading raw audio stream from CDN...";

                // Fetch the actual audio file via proxy to keep it browser-safe
                const audioFileUrl = "https://allorigins.win" + encodeURIComponent(directAudioUrl);
                
                // 3. Load the remote file directly into FFmpeg's virtual memory space
                ffmpeg.FS('writeFile', 'input_track', await fetchFile(audioFileUrl));
                
                statusDiv.innerText = `Converting file to ${targetFormat.toUpperCase()}...`;
                
                // 4. Run the encoding process using universal FFmpeg commands
                const outputName = `converted_track.${targetFormat}`;
                if (targetFormat === 'mp3') {
                    await ffmpeg.run('-i', 'input_track', '-codec:a', 'libmp3lame', '-qscale:a', '2', outputName);
                } else if (targetFormat === 'wav') {
                    await ffmpeg.run('-i', 'input_track', '-codec:a', 'pcm_s16le', outputName);
                }

                // 5. Read the final file out of virtual memory and trigger download
                const outputData = ffmpeg.FS('readFile', outputName);
                const blob = new Blob([outputData.buffer], { type: `audio/${targetFormat}` });
                const downloadUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `slaps_export_${Date.now()}.${targetFormat}`;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                statusDiv.innerText = "Conversion complete! Check your downloads.";

            } catch (error) {
                statusDiv.style.color = "#ff4757";
                statusDiv.innerText = "Error: " + error.message;
                console.error(error);
            } finally {
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

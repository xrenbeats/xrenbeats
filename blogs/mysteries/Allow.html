<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandfather Bicycle Spinner</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Added Comic Sans for maximum sketchy vibes */
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 0;
            border: 2px solid #ff0000; /* Aggressive red border */
            box-shadow: 5px 5px 0px #000000;
            text-align: center;
            max-width: 400px;
        }

        h1 { color: #333333; margin-bottom: 10px; }
        p { color: #666666; margin-bottom: 20px; font-weight: bold; }

        button {
            background-color: #0000ff;
            color: white;
            border: 2px outset #cccccc;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:active { border: 2px inset #cccccc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚠️ VINTAGE BICYCLE HUB ⚠️</h1>
        <p>Click "Allow" to Verify You Are Human!</p>
        <button id="notifyBtn">Enable Bicycle Spinner Alerts</button>
    </div>

    <script>
        const btn = document.getElementById('notifyBtn');

        btn.addEventListener('click', async () => {
            if (!('Notification' in window) || !('serviceWorker' in navigator)) {
                alert('Your browser is too old for these bicycle tips!');
                return;
            }

            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                // Register the Service Worker
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('Service Worker Registered!');
                    
                    // Send the initial success notification
                    registration.showNotification('Success!', { 
                        body: 'WARNING: Penny-Farthing tips enabled.', 
                        icon: 'https://blog.sucuri.net/wp-content/uploads/2022/12/spam-pop-up-wordpress-pages.png' 
                    });

                    // Tell the background worker to start the 30-second loop
                    if (navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage('startSpam');
                    }
                }).catch(err => console.error('Service Worker Failed:', err));
                
            } else {
                alert('Notifications blocked. The high saddle remains out of reach.');
            }
        });
    </script>
</body>
</html>

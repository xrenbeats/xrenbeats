<script>
// The Core EZP+ Parsing Architecture
class EZPPlusCompiler {
    constructor() {
        this.aliases = {};
        this.rules = {};
        this.errors = [];
    }

    // Step 1: Scanner & Analyzer to look for structural definition blocks first (Hoisting)
    preScan(lines) {
        this.aliases = {};
        this.rules = {};
        this.errors = [];

        lines.forEach((line, index) => {
            let cleanLine = line.trim();
            if (!cleanLine || cleanLine.startsWith("//")) return;

            // Target pattern: define "key" as "val" and "prop" == "val"
            if (cleanLine.startsWith("define ")) {
                let parts = cleanLine.split(/\bif\b|\band\b/i);
                let baseMatch = parts[0].match(/define\s+["']([^"']+)["']\s+as\s+["']([^"']+)["']/i);
                
                // Backup check for non-quoted config names like: define "shop_config" shop as "shop-add"
                if (!baseMatch) {
                    baseMatch = cleanLine.match(/define\s+["']([^"']+)["']\s+[\w\s]+\s+as\s+["']([^"']+)["']/i);
                }

                if (baseMatch) {
                    let key = baseMatch[1];
                    let val = baseMatch[2];
                    this.aliases[key] = val;

                    // Parse secondary rule logic (like "text_format" == "title")
                    if (parts[1] && parts[1].includes("==")) {
                        let propMatch = parts[1].match(/["']([^"']+)["']\s*==\s*["']([^"']+)["']/);
                        if (propMatch) {
                            this.rules[key] = { property: propMatch[1], value: propMatch[2] };
                        }
                    }
                }
            }
        });
    }

    // Step 2: Main Compiler Loop
    compile(sourceCode) {
        const lines = sourceCode.split('\n');
        this.preScan(lines);

        let htmlDOM = "";
        let scripts = "";

        // Check for common formatting issues to throw helpful compiler warnings
        if (sourceCode.includes('text_title') && !sourceCode.includes('== "title"')) {
            this.errors.push({
                message: 'Missing configuration worker logic for "text_title".',
                type: 'MISSING_DEFINITION',
                suggestedFix: '\ndefine "text_title" as "text" and "text_format" == "title"'
            });
            return null;
        }

        lines.forEach((line, index) => {
            let cleanLine = line.trim();
            if (!cleanLine || cleanLine.startsWith("//") || cleanLine.startsWith("define")) return;

            // 1. Compile Page Titles
            if (cleanLine.match(/add\s+["']title["']\s+as\s+["']([^"']+)["']/i)) {
                let titleStr = cleanLine.match(/add\s+["']title["']\s+as\s+["']([^"']+)["']/i)[1];
                scripts += `document.title = "${titleStr}";\n`;
            }

            // 2. Compile Text Elements with dynamic property wrappers
            else if (cleanLine.match(/add\s+["']text["']\s+with\s+["']([^"']+)["']/i)) {
                let textStr = cleanLine.match(/add\s+["']text["']\s+with\s+["']([^"']+)["']/i)[1];
                let className = "ezp-text";

                if (cleanLine.includes('as "subtitle"')) {
                    className = "ezp-subtitle";
                } else if (cleanLine.includes('as "text_title"')) {
                    // Check if rule applied structural conversion
                    if (this.rules["text_title"] && this.rules["text_title"].value === "title") {
                        className = "ezp-title-text";
                    }
                }
                htmlDOM += `<div class="${className}">${textStr}</div>`;
            }

            // 3. Compile E-commerce Product Action bindings
            else if (cleanLine.includes("add product as var") && cleanLine.includes("onclick")) {
                htmlDOM += `<button class="ezp-btn" onclick="toggleShopPage(true)">View Product</button>`;
            }

            // 4. Compile dynamic Shop Configuration interfaces
            else if (cleanLine.includes("show buttons") && cleanLine.includes("onclick")) {
                let shopPageHTML = `
                    <div id="product_page_view" class="ezp-shop-page" style="display:none;">
                        <button style="position:absolute; top:5px; left:5px;" onclick="toggleShopPage(false)">X</button>
                        <h4>Product Details</h4>
                        <button class="ezp-btn" style="background:#007bc4; color:white;" onclick="triggerStripeCheckout()">Buy Now</button>
                    </div>
                `;
                htmlDOM += shopPageHTML;
            }
        });

        return { htmlDOM, scripts };
    }
}

// Global runtime execution hooks
function toggleShopPage(show) {
    const page = document.getElementById('product_page_view');
    if(page) page.style.display = show ? 'block' : 'none';
}

function triggerStripeCheckout() {
    alert("Launching checkout from Stripe");
}

    if (compiler.errors.length > 0) {
        let err = compiler.errors[0];
        errorText.innerText = `Error: ${err.message}`;
        errorPanel.style.display = "flex";

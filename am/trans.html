<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xren — pride</title>
    <style>
        :root {
            --bg-color: #0b0b0f;
            --text-color: #f3f4f6;
            --accent-color: #a855f7;
            --secondary-accent: #3b82f6;
            --card-bg: #161622;
            --border-color: #2d2d3f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            transition: background 0.4s, color 0.4s;
        }

        body.rainbow-active {
            background: linear-gradient(132deg, #ff595e, #ffca3a, #8ac926, #1982c4, #6a4c93);
            background-size: 400% 400%;
            animation: rainbowShift 12s ease infinite;
            color: #ffffff;
        }

        body.rainbow-active :root {
            --accent-color: #ffffff;
            --secondary-accent: #ffffff;
        }

        body.rainbow-active header {
            background: rgba(0, 0, 0, 0.35);
        }

        body.rainbow-active h1 {
            background: #ffffff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        body.rainbow-active .subtitle {
            color: #ffffff;
            opacity: 0.9;
        }

        body.rainbow-active .bio-box, 
        body.rainbow-active #theme-dashboard {
            background-color: rgba(0, 0, 0, 0.75);
            border-color: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
        }

        body.rainbow-active h2 {
            border-bottom-color: #ffffff;
            color: #ffffff;
        }

        body.rainbow-active p {
            color: #f3f4f6;
        }

        body.rainbow-active .theme-toggle-btn {
            background-color: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
        }

        body.rainbow-active .theme-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1e1b4b 0%, var(--bg-color) 100%);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.4s;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-color), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: background 0.4s;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #9ca3af;
            margin: 12px 0 30px 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        main {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        section {
            margin-bottom: 70px;
        }

        h2 {
            font-size: 2rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
            letter-spacing: 1px;
            transition: border-color 0.4s;
        }

        p {
            font-size: 1.15rem;
            color: #d1d5db;
            margin-bottom: 24px;
        }

        .highlight {
            color: #ffffff;
            font-weight: 600;
            text-decoration: underline;
            text-decoration-color: var(--accent-color);
            text-underline-offset: 4px;
        }

        .bio-box {
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-color);
            padding: 30px;
            border-radius: 8px;
            margin-top: 35px;

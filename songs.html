<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Songs | Xren!</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-color: #1db954; /* Optional subtle pop color */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        p.bio {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--text-sub);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: left;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            display: block;
            transition: background-color 0.2s ease, transform 0.1s ease;
            text-align: center;
        }

        .btn:hover {
            background-color: #2a2a2a;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .stats-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .stats-btn {
            background: transparent;
            color: var(--text-sub);
            border: 1px solid var(--text-sub);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .stats-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        footer {
            margin-top: 50px;
            color: var(--text-sub);
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <img src="path-to-your-image.jpg" alt="Artist Profile" class="profile-img">
        <h1>Xren</h1>
        <p class="bio">Artist / Producer</p>

        <div class="section-title">Listen Everywhere</div>
        
        <div class="links-grid">
            <a href="https://spotify.com" class="btn" target="_blank">Spotify</a>
            <a href="https://apple.com" class="btn" target="_blank">Apple Music</a>
            <a href="https://soundcloud.com" class="btn" target="_blank">SoundCloud</a>
            <a href="https://tidal.com" class="btn" target="_blank">Tidal</a>
            <a href="https://youtube.com" class="btn" target="_blank">YouTube Music</a>
            <a href="https://amazon.com" class="btn" target="_blank">Amazon Music</a>
            <a href="https://bandcamp.com" class="btn" target="_blank">Bandcamp</a>
            <a href="https://deezer.com" class="btn" target="_blank">Deezer</a>
        </div>

        <div class="section-title">Analytics & Insights</div>
        <div class="stats-wrapper">

            <a href="https://songstats.com/artist/6abxours/xren" class="stats-btn" target="_blank">Songstats</a>
            <a href="https://radiostats.com/artist/6abxours/xren" class="stats-btn" target="_blank">Radiostats</a>
        </div>

        <footer>
            <p>&copy; 2026 Xren. All rights reserved. </p>
        </footer>
    </div>

</body>
</html>

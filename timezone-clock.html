<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .clock-card:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            color: #e0e7ff;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .time-display {
            font-size: 2.5em;
            color: #fbbf24;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            letter-spacing: 2px;
        }

        .date-display {
            color: #dbeafe;
            font-size: 0.85em;
            opacity: 0.9;
        }

        .offset-display {
            color: #c7d2fe;
            font-size: 0.75em;
            margin-top: 8px;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .timezone-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        input {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .info {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85em;
            margin-top: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 2em;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 Multi-Timezone Clock</h1>
    <div class="clock-grid" id="clockGrid"></div>
    
    <div class="timezone-input">
        <input type="text" id="timezoneInput" placeholder="Enter timezone (e.g., America/New_York)">
        <button onclick="addTimezone()">+ Add Timezone</button>
        <button onclick="resetTimezones()">Reset to Default</button>
    </div>

    <div class="controls">
        <button onclick="toggle12Hour()">Toggle 12/24 Hour</button>
    </div>

    <div class="info">
        <p>💡 Enter IANA timezone identifiers like: America/New_York, Europe/London, Asia/Tokyo, Australia/Sydney</p>
    </div>
</div>

<script>
    let timezones = [
        'America/New_York',
        'Europe/London',
        'Asia/Tokyo',
        'Australia/Sydney',
        'America/Los_Angeles',
        'Europe/Paris'
    ];

    let use24Hour = true;

    // Load saved timezones from localStorage
    function loadTimezones() {
        const saved = localStorage.getItem('timezones');
        if (saved) {
            timezones = JSON.parse(saved);
        }
    }

    // Save timezones to localStorage
    function saveTimezones() {
        localStorage.setItem('timezones', JSON.stringify(timezones));
    }

    function formatTime(date, timezone) {
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: timezone,
            hour: use24Hour ? '2-digit' : 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: !use24Hour
        });

        return formatter.format(date);
    }

    function formatDate(date, timezone) {
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: timezone,
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });

        return formatter.format(date);
    }

    function getUTCOffset(date, timezone) {
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: timezone,
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });

        const parts = formatter.formatToParts(date);
        const tzDate = new Date(
            parseInt(parts.find(p => p.type === 'year').value),
            parseInt(parts.find(p => p.type === 'month').value) - 1,
            parseInt(parts.find(p => p.type === 'day').value),
            parseInt(parts.find(p => p.type === 'hour').value),
            parseInt(parts.find(p => p.type === 'minute').value),
            parseInt(parts.find(p => p.type === 'second').value)
        );

        const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
        const diff = (tzDate - utcDate) / (1000 * 60); // difference in minutes
        const hours = Math.floor(Math.abs(diff) / 60);
        const mins = Math.abs(diff) % 60;
        const sign = diff >= 0 ? '+' : '-';

        return `UTC ${sign}${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
    }

    function updateClocks() {
        const clockGrid = document.getElementById('clockGrid');
        const now = new Date();

        clockGrid.innerHTML = '';

        timezones.forEach(timezone => {
            try {
                const time = formatTime(now, timezone);
                const date = formatDate(now, timezone);
                const offset = getUTCOffset(now, timezone);

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-name">${timezone}</div>
                    <div class="time-display">${time}</div>
                    <div class="date-display">${date}</div>
                    <div class="offset-display">${offset}</div>
                    <button onclick="removeTimezone('${timezone}')" style="width: 100%; margin-top: 15px; padding: 8px;">Remove</button>
                `;
                clockGrid.appendChild(card);
            } catch (e) {
                console.error(`Invalid timezone: ${timezone}`);
            }
        });
    }

    function addTimezone() {
        const input = document.getElementById('timezoneInput');
        const timezone = input.value.trim();

        if (!timezone) {
            alert('Please enter a timezone');
            return;
        }

        try {
            // Validate timezone by checking if it works
            new Date().toLocaleString('en-US', { timeZone: timezone });

            if (!timezones.includes(timezone)) {
                timezones.push(timezone);
                saveTimezones();
                updateClocks();
                input.value = '';
            } else {
                alert('This timezone is already added');
            }
        } catch (e) {
            alert(`Invalid timezone: ${timezone}\nUse IANA format (e.g., America/New_York)`);
        }
    }

    function removeTimezone(timezone) {
        timezones = timezones.filter(tz => tz !== timezone);
        saveTimezones();
        updateClocks();
    }

    function resetTimezones() {
        timezones = [
            'America/New_York',
            'Europe/London',
            'Asia/Tokyo',
            'Australia/Sydney',
            'America/Los_Angeles',
            'Europe/Paris'
        ];
        saveTimezones();
        updateClocks();
    }

    function toggle12Hour() {
        use24Hour = !use24Hour;
        updateClocks();
    }

    // Allow Enter key to add timezone
    document.getElementById('timezoneInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTimezone();
    });

    // Initialize
    loadTimezones();
    updateClocks();

    // Update clocks every second
    setInterval(updateClocks, 1000);
</script>

</body>
</html>

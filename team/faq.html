    <title>Music Team Q&A</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #8a2be2; /* Sleek purple accent */
            --accent-hover: #9b4dca;
            --text-main: #f5f5f5;
            --text-muted: #b3b3b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 50px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .member-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-left: 5px solid var(--accent);
        }

        /* Clickable header that redirects */
        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .member-header:hover {
            color: var(--accent-hover);
        }

        .member-header h2 {
            margin: 0;
            font-size: 2rem;
        }

        .redirect-icon {
            font-size: 0.9rem;
            color: var(--accent);
            background: rgba(138, 43, 226, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.3s ease;
        }

        .member-header:hover .redirect-icon {
            background: var(--accent);
            color: #fff;
        }

        /* Q&A Accordion styling */
        details {
            background-color: #252525;
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
        }

        summary {
            padding: 15px 20px;
            font-weight: 600;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            content: '−';
        }

        details p {
            padding: 0 20px 20px 20px;
            margin: 0;
            color: var(--text-muted);
        }
    </style>
</head>

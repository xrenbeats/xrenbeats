<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTÉ TRANSLATE — XrenBeats</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --border: #2a2a38;
            --accent: #00ffcc;
            --accent2: #7c4dff;
            --accent3: #ff4dac;
            --text: #e8e8f0;
            --muted: #666680;
            --glow: rgba(0, 255, 204, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            width: 100%;
            max-width: 700px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
            position: relative;
        }

        .brand-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.7em;
            color: var(--accent2);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-tag::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--accent2);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            color: var(--muted);
            letter-spacing: 0.15em;
            margin-top: 10px;
        }

        /* Translate card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,255,204,0.05);
        }

        .panel {
            padding: 28px;
        }

        .panel + .panel {
            border-top: 1px solid var(--border);
        }

        .panel-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lang-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .lang-badge.en {
            background: rgba(124,77,255,0.15);
            color: var(--accent2);
            border: 1px solid rgba(124,77,255,0.3);
        }

        .lang-badge.xte {
            background: rgba(0,255,204,0.1);
            color: var(--accent);
            border: 1px solid rgba(0,255,204,0.25);
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 16px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            resize: none;
            font-family: 'Syne', sans-serif;
            font-size: 1em;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            border-color: rgba(0,255,204,0.4);
            box-shadow: 0 0 0 3px rgba(0,255,204,0.06);
        }

        textarea::placeholder { color: var(--muted); }

        /* Output */
        .output-area {
            min-height: 130px;
            padding: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.95em;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--accent);
            position: relative;
            transition: border-color 0.2s;
        }

        .output-area.has-content {
            border-color: rgba(0,255,204,0.2);
            box-shadow: 0 0 20px rgba(0,255,204,0.04);
        }

        .output-placeholder {
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 0.9em;
            font-style: italic;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: rgba(0,255,204,0.03);
            border-top: 1px solid var(--border);
            font-family: 'Space Mono', monospace;
            font-size: 0.6em;
            color: var(--muted);
            letter-spacing: 0.1em;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stat { display: flex; align-items: center; gap: 6px; }
        .stat-val { color: var(--accent); font-weight: 700; }

        /* Copy button */
        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

        /* Dictionary count badge */
        .dict-info {
            margin-top: 20px;
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .dict-count {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>

    <div class="wrapper">

            <p class="subtitle">// CONLANG ENGINE v2.0 — ENGLISH → XTÉS</p>

        <div class="card">

                    Input

                </div>
                <textarea id="input" placeholder="Type anything in English..." oninput="translateText()"></textarea>
            </div>

            <div class="panel">

                    Output

                </div>
                <div id="output" class="output-area">

                </div>
            </div>

            <div class="stats-bar">

                <span class="stat">CHARS: <span class="stat-val" id="char-count">0</span></span>
                <span class="stat">DICT ENTRIES: <span class="stat-val" id="dict-size">0</span></span>
                <button class="copy-btn" id="copy-btn" onclick="copyOutput()">COPY</button>
            </div>
        </div>

        <div class="dict-info">
            <span>XTÉ DICTIONARY</span>
            <span class="dict-count" id="total-entries">—</span>

        // Sort keys by length descending so phrases match before single words
        const sortedKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);

        // Update dict count on load
        document.getElementById('total-entries').textContent = Object.keys(dictionary).length;
        document.getElementById('dict-size').textContent = Object.keys(dictionary).length;

        function translateText() {
            const input = document.getElementById('input').value;
            const outputDiv = document.getElementById('output');
            const charCountEl = document.getElementById('char-count');
            const wordCountEl = document.getElementById('word-count');

            charCountEl.textContent = input.length;

            if (!input.trim()) {
                outputDiv.innerHTML = '<span class="output-placeholder">Translation will appear here...</span>';
                outputDiv.classList.remove('has-content');
                wordCountEl.textContent = 0;
                return;
            }

            let translated = input;
            let matchCount = 0;

            sortedKeys.forEach(key => {
                const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`\\b${escaped}\\b`, 'gi');
                translated = translated.replace(regex, (match) => {
                    matchCount++;
                    const translation = dictionary[key];
                    if (match[0] === match[0].toUpperCase() && match[0].toLowerCase() !== match[0].toUpperCase()) {
                        return translation.charAt(0).toUpperCase() + translation.slice(1);
                    }
                    return translation;
                });
            });

            outputDiv.textContent = translated;
            outputDiv.classList.add('has-content');
            wordCountEl.textContent = matchCount;
        }

        function copyOutput() {
            const text = document.getElementById('output').textContent;
            if (!text || text === 'Translation will appear here...') return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = 'COPIED!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'COPY';
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

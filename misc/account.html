<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XrenBeats | Global Social Network</title>
    <style id="theme-style"></style>
    <style>
        /* BASE SYSTEM STYLES */
        :root { --main: #2067b2; --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); transition: all 0.4s ease; min-height: 100vh; }
        .hidden { display: none !important; }
        .container { max-width: 550px; margin: 40px auto; padding: 30px; background: var(--card); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
        .nav-logo { text-align: center; font-weight: 900; font-size: 28px; cursor: pointer; color: var(--main); letter-spacing: -1px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; margin: 12px 0; padding: 14px; box-sizing: border-box; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--main); }
        button { background: var(--main); color: white; border: none; padding: 14px; cursor: pointer; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .pfp-big { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; background: #ddd; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav-logo" onclick="location.href=location.pathname">XRENBEATS</div>

    <!-- AUTH SCREEN -->
    <div id="screen-auth" class="container">
        <h2 id="auth-title" style="margin-top:0">Create Identity</h2>
        <input type="text" id="username" placeholder="Choose Username">
        <input type="password" id="password" placeholder="Secure Password">
        <button id="btn-auth">Initialize Sign Up</button>
        <p align="center" style="font-size:14px"><a href="javascript:void(0)" id="auth-toggle">Already a member? Login here</a></p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="screen-dash" class="container hidden">
        <h2 style="margin-top:0">Profile Customization</h2>
        <input type="text" id="set-pronouns" placeholder="Pronouns (e.g. they/them)">
        <textarea id="set-bio" rows="4" placeholder="Write your lore here..."></textarea>
        <input type="text" id="set-pfp" placeholder="PFP Image URL">
        
        <label style="font-weight:bold; font-size: 14px;">Select Era Theme:</label>
        <select id="set-theme">
            <option value="modern">2020s (Modern Day)</option>
            <option value="1990s">1990s (Geocities / Grey)</option>
            <option value="2000s">2000s (Frutiger Aero / Glossy)</option>
            <option value="2010s">2010s (Flat Design / Minimal)</option>
            <option value="vapor">1980s (Vaporwave / Neon)</option>
            <option value="matrix">Digital (Matrix / Terminal)</option>
            <option value="2024">2024 (Bento Box / Rounded)</option>
            <option value="2025">2025 (Glassmorphism / Frosted)</option>
            <option value="2026">2026 (Holo-Interface / Cyan)</option>
            <option value="dark">Stealth (Pure Dark Mode)</option>
        </select>
        
        <button id="btn-save" style="background:#00c853">Save & Publish to World</button>
        <button id="btn-logout" style="background:#ff3d00; margin-top:10px">Sign Out</button>
    </div>

    <!-- PUBLIC PROFILE SCREEN -->
    <div id="screen-profile" class="container hidden">
        <center>
            <img id="view-pfp" class="pfp-big" src="">
            <h1 id="view-user" style="margin:15px 0 5px 0; font-size: 32px;"></h1>
            <p id="view-pronouns" style="margin:0; opacity:0.6; font-style: italic;"></p>
            <hr>
            <p id="view-bio" style="line-height:1.6; font-size: 18px;"></p>
            
            <div id="owner-controls" class="hidden">
                 <button id="btn-edit-mode" style="background:#444; border: 1px solid #666;">Settings & Themes</button>
            </div>
        </center>
    </div>

<script type="module">
    // CORRECT FIREBASE IMPORTS
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, doc, setDoc, getDoc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBWydqTaTQnrTqVTGET2Mv9L7BWRUHeFrk",
        authDomain: "xrenbeats-com.firebaseapp.com",
        projectId: "xrenbeats-com",
        storageBucket: "xrenbeats-com.firebasestorage.app",
        messagingSenderId: "747965799452",
        appId: "1:747965799452:web:baeb00a0787b18d92753d9",
        measurementId: "G-2GSWM567W5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- THE 10 THEME ENGINE ---
    const themes = {
        "1990s": "body{background:#c0c0c0;font-family:'Times New Roman',serif} .container{background:#dcdcdc;border:3px outset #fff;border-radius:0;box-shadow:none} button{border:2px outset #fff;background:#c0c0c0;color:#000;border-radius:0} h2{background:#000080;color:#fff;padding:5px;font-family:Arial} .pfp-big{border-radius:0;border:3px ridge #fff}",
        "2000s": "body{background:linear-gradient(135deg,#7abcff 0%,#4096ee 100%)} .container{border-radius:40px; border:4px solid rgba(255,255,255,0.7); background:rgba(255,255,255,0.9); box-shadow: 0 20px 40px rgba(0,0,0,0.3)} button{border-radius:50px; background:linear-gradient(#62c462,#419641)}",
        "2010s": "body{background:#f3f3f3; color:#333} .container{border-radius:0; border:1px solid #ddd; box-shadow:none} button{border-radius:2px}",
        "vapor": "body{background:#2d0a31; color:#00f2ff} .container{background:#1a051d; border:2px solid #ff00ff; box-shadow: 10px 10px 0px #00f2ff} button{background:#ff00ff; font-family:cursive}",
        "matrix": "body{background:#000; color:#00ff00; font-family:monospace} .container{background:#000; border:1px solid #00ff00; box-shadow:0 0 15px #00ff00} button{background:#000; border:1px solid #00ff00; color:#00ff00}",
        "2024": "body{background:#f0f0f0} .container{border-radius:35px; border:8px solid #000; box-shadow: 15px 15px 0px #2067b2} button{border-radius:15px; background:#000}",
        "2025": "body{background:linear-gradient(45deg, #e0c3fc 0%, #8ec5fc 100%)} .container{background:rgba(255,255,255,0.4); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.5); border-radius:30px} button{background:rgba(0,0,0,0.7)}",
        "2026": "body{background:#050505; color:#00ffcc; font-family:monospace} .container{background:rgba(0,255,204,0.05); border:1px solid #00ffcc; box-shadow:0 0 30px rgba(0,255,204,0.2); text-shadow:0 0 10px #00ffcc} .pfp-big{border-color:#00ffcc}",
        "dark": "body{background:#0a0a0a; color:#eee} .container{background:#151515; border:1px solid #222} button{background:#333}",
        "modern": "" // Default
    };

    let isLogin = false;
    let currentUser = null;

    // --- URL LOGIC ---
    const params = new URLSearchParams(window.location.search);
    const userParam = params.get('user');

    if (userParam) {
        loadPublicProfile(userParam);
    }

    // --- AUTH ACTIONS ---
    document.getElementById('auth-toggle').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Member Login" : "Create Identity";
        document.getElementById('btn-auth').innerText = isLogin ? "Access Account" : "Initialize Sign Up";
        document.getElementById('auth-toggle').innerText = isLogin ? "Need a profile? Sign up" : "Already a member? Login here";
    };

    document.getElementById('btn-auth').onclick = async () => {
        const u = document.getElementById('username').value.toLowerCase().trim();
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Missing credentials!");

        const userRef = doc(db, "users", u);
        const snap = await getDoc(userRef);

        if(isLogin) {
            if(snap.exists() && snap.data().pass === p) {
                currentUser = snap.data();
                sessionStorage.setItem('active_user', u); // Remember login for session
                showDash();
            } else { alert("Authentication failed. Check name/password."); }
        } else {
            if(snap.exists()) return alert("Username already exists in the database.");
            currentUser = { name: u, pass: p, bio: "No bio yet.", pronouns: "", pfp: "", theme: "modern" };
            await setDoc(userRef, currentUser);
            sessionStorage.setItem('active_user', u);
            showDash();
        }
    };

    // --- SAVE ACTION ---
    document.getElementById('btn-save').onclick = async () => {
        currentUser.bio = document.getElementById('set-bio').value;
        currentUser.pfp = document.getElementById('set-pfp').value;
        currentUser.pronouns = document.getElementById('set-pronouns').value;
        currentUser.theme = document.getElementById('set-theme').value;
        
        await setDoc(doc(db, "users", currentUser.name), currentUser);
        window.location.href = "?user=" + currentUser.name;
    };

    // --- LOAD PROFILE ---
    async function loadPublicProfile(name) {
        const snap = await getDoc(doc(db, "users", name.toLowerCase()));
        if(!snap.exists()) {
            alert("This user has not been found in our records.");
            window.location.href = window.location.pathname;
            return;
        }
        
        const data = snap.data();
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-profile').classList.remove('hidden');
        
        document.getElementById('view-user').innerText = name.toUpperCase();
        document.getElementById('view-bio').innerText = data.bio;
        document.getElementById('view-pfp').src = data.pfp || "https://dicebear.com" + name;
        document.getElementById('view-pronouns').innerText = data.pronouns;

        // Apply Theme
        if(themes[data.theme]) document.getElementById('theme-style').innerHTML = themes[data.theme];

        // Check if I am the owner
        const loggedInAs = sessionStorage.getItem('active_user');
        if(loggedInAs === name.toLowerCase()) {
            document.getElementById('owner-controls').classList.remove('hidden');
            currentUser = data; // Sync for edit
        }
    }

    // --- NAVIGATION ---
    function showDash() {
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-profile').classList.add('hidden');
        document.getElementById('screen-dash').classList.remove('hidden');
        document.getElementById('set-bio').value = currentUser.bio;
        document.getElementById('set-pfp').value = currentUser.pfp;
        document.getElementById('set-pronouns').value = currentUser.pronouns;
        document.getElementById('set-theme').value = currentUser.theme;
    }

    document.getElementById('btn-edit-mode').onclick = showDash;
    document.getElementById('btn-logout').onclick = () => {
        sessionStorage.clear();
        window.location.href = window.location.pathname;
    };

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailify</title>
  
  <script>
const statusText = document.getElementById("status");

// Register Service Worker
async function registerServiceWorker() {

    if (!("serviceWorker" in navigator)) {
        statusText.textContent = "Service Workers not supported.";
        return null;
    }

    try {

        const registration = await navigator.serviceWorker.register("/misc/mailify/sw.js");

        console.log("✅ Notifications enabled!", registration);

        statusText.textContent = "Service Worker Ready ✅";

        return registration;

    } catch (err) {

        console.error("❌ Failed to register Service Worker:", err);

        statusText.textContent = "Failed to register Service Worker.";

        return null;
    }

}

let registrationPromise;

// Wait until the page loads before registering
window.addEventListener("load", () => {
    registrationPromise = registerServiceWorker();
});

// Ask for Notification Permission
document.getElementById("enable").addEventListener("click", async () => {

    if (!("Notification" in window)) {
        alert("Notifications are not supported.");
        return;
    }

    const permission = await Notification.requestPermission();

    if (permission === "granted") {

        statusText.textContent = "Notifications Enabled ✅";

    } else if (permission === "denied") {

        statusText.textContent = "Notifications Blocked ❌";

    } else {

        statusText.textContent = "Permission Dismissed";

    }

});

// Local Test Notification
document.getElementById("test").addEventListener("click", async () => {

    if (Notification.permission !== "granted") {
        alert("Please enable notifications first.");
        return;
    }

    const registration = await registrationPromise;

    if (!registration) {
        alert("Service Worker isn't ready yet.");
        return;
    }

    registration.showNotification("📧 New Email", {
        body: "Welcome to Mailify! This is a test notification.",
        icon: "icon-192.png",
        badge: "badge.png",
        tag: "mailify-demo",
        data: {
            url: "/"
        }
    });

});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <style>
        :root {
            --primary-color: #6a1b9a;
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #ffffff;
            --text-muted: #a0a0a5;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .contact-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2a2a30;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #8e24aa;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Support Page</h2>
        <p class="subtitle">This is the page if you need help with anything, or have inquiries. Thank you! :)</p>
        
        <!-- Form configured to send submissions to jace@xrenbeats.com via FormSubmit -->
        <form action="https://formsubmit.co" method="POST">
            <!-- Spam Protection (Honeypot) -->
            <input type="text" name="_honey" style="display:none">
            
            <!-- Email Subject Customization -->
            <input type="hidden" name="_subject" value="New message from xrenbeats.com">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="johndoe123@example.com">
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="Write your message here..."></textarea>
            </div>
            
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>

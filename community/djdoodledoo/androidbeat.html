<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDROID BEAT FLP</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            padding: 40px;
            border: 1px solid #ccc;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: #000;
        }
        .details {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .btn {
            display: inline-block;
            background-color: #0056b3;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #004494;
        }
        .btn:active {
            background-color: #003366;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>File Download</h1>
    <p class="details">
        <strong>File Name:</strong> Android Beat FLP<br>
        <strong>Format:</strong> FLP Project File
    </p>
    
    <a href="https://drive.google.com/file/d/1gFDelWbaHcXmL1QLjqHcYEUoW58jU8XD/view?usp=sharing" 
       target="_blank" 
       class="btn" 
       id="downloadBtn">
        Download from Google Drive
    </a>

    <div class="footer">
        Verified File: Android Beat
    </div>
</div>

<script>
    const downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.addEventListener('click', () => {
        downloadBtn.textContent = 'Redirecting...';
        downloadBtn.style.backgroundColor = '#666';
    });
</script>

</body>
</html>

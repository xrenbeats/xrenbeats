<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDROID BEAT FLP</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .download-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: var(--primary);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .file-info {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn.loading {
            background-color: var(--text-muted);
            pointer-events: none;
        }

        .btn.success {
            background-color: var(--success);
        }

        .footer-note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <div class="icon-container">

            <svg viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
        </div>

        <h1>Android Beat FLP</h1>
        <p class="file-info">Format: FLP&bull; Djdoodledoo is cool ig</p>


        <a href="https://drive.google.com/file/d/1gFDelWbaHcXmL1QLjqHcYEUoW58jU8XD/view?usp=sharing" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="btn" 
           id="downloadBtn">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span id="btnText">Download FLP</span>
        </a>

        <p class="footer-note">ANDROID BEAT</p>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');

        downloadBtn.addEventListener('click', () => {

            downloadBtn.classList.add('loading');
            btnText.textContent = 'Opening Drive...';
            
            setTimeout(() => {
                downloadBtn.classList.remove('loading');
                downloadBtn.classList.add('success');
                btnText.textContent = 'Downloaded Started';
            }, 1500);
        });
    </script>

</body>
</html>

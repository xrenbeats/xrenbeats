<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDROID BEAT FLP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&family=Bebas+Neue&family=Pacifico&family=VT323&family=Cinzel:wght@400;700&family=Permanent+Marker&family=Abril+Fatface&family=Playfair+Display:wght@400;700&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;700&family=Russo+One&family=Caveat:wght@400;700&family=Lobster&family=Dancing+Script:wght@700&family=Monoton&family=Righteous&family=Bangers&family=Special+Elite&family=Creepster&family=Bungee+Shade&display=swap');

:root {
  --bg: #f4f4f4;
  --card: #ffffff;
  --text: #333333;
  --sub: #666666;
  --border: #cccccc;
  --accent: #0056b3;
  --accent2: #004494;
  --accent3: #003366;
  --btn-text: #ffffff;
  --footer: #888888;
  --shadow: rgba(0,0,0,0.1);
  --font-title: 'Orbitron', sans-serif;
  --font-body: Arial, sans-serif;
  --radius: 0px;
  --card-effect: none;
  --btn-radius: 0px;
  --border-style: 1px solid var(--border);
  --anim: none;
  --overlay: none;
  --scanlines: none;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background-color: var(--bg);
  background-image: var(--overlay);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.4s ease;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: var(--scanlines);
  pointer-events: none;
  z-index: 10;
}

.container {
  background: var(--card);
  padding: 40px;
  border: var(--border-style);
  width: 100%;
  max-width: 500px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  position: relative;
  z-index: 1;
  animation: var(--anim);
  backdrop-filter: var(--blur, none);
}

h1 {
  font-family: var(--font-title);
  font-size: 1.5rem;
  margin: 0 0 10px 0;
  color: var(--text);
  letter-spacing: var(--title-spacing, 0);
  text-shadow: var(--title-shadow, none);
}

.details {
  font-size: 0.9rem;
  color: var(--sub);
  margin-bottom: 20px;
  border-bottom: var(--border-style);
  padding-bottom: 10px;
}

.btn {
  display: inline-block;
  background-color: var(--accent);
  color: var(--btn-text);
  padding: 12px 24px;
  text-decoration: none;
  font-size: 1rem;
  font-weight: bold;
  border: var(--btn-border, none);
  cursor: pointer;
  border-radius: var(--btn-radius);
  font-family: var(--font-title);
  letter-spacing: var(--btn-spacing, 0);
  text-shadow: var(--btn-shadow, none);
  box-shadow: var(--btn-glow, none);
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  background-color: var(--accent2);
  transform: var(--btn-hover-transform, none);
  box-shadow: var(--btn-hover-glow, none);
}

.btn:active { background-color: var(--accent3); transform: scale(0.97); }

.footer {
  margin-top: 20px;
  font-size: 0.8rem;
  color: var(--footer);
  font-family: var(--font-body);
}

/* Theme Switcher */
.theme-panel {
  position: fixed;
  top: 0;
  right: -320px;
  width: 320px;
  height: 100vh;
  background: rgba(0,0,0,0.92);
  color: #fff;
  z-index: 9999;
  overflow-y: auto;
  transition: right 0.35s cubic-bezier(.77,0,.18,1);
  padding: 20px 16px 40px;
  font-family: 'Space Mono', monospace;
  backdrop-filter: blur(10px);
}
.theme-panel.open { right: 0; }

.theme-toggle-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10000;
  background: var(--accent);
  color: var(--btn-text);
  border: none;
  padding: 10px 16px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Space Mono', monospace;
  border-radius: 6px;
  font-weight: bold;
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: all 0.2s;
}
.theme-toggle-btn:hover { transform: scale(1.05); }

.theme-panel h2 {
  font-size: 0.85rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  color: #aaa;
  border-bottom: 1px solid #333;
  padding-bottom: 8px;
}

.theme-section-label {
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #666;
  margin: 16px 0 6px;
}

.theme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.theme-btn {
  padding: 8px 6px;
  font-size: 0.7rem;
  font-family: 'Space Mono', monospace;
  border: 1px solid #333;
  background: #111;
  color: #ddd;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
  text-align: center;
  line-height: 1.3;
}
.theme-btn:hover { border-color: #fff; color: #fff; background: #222; }
.theme-btn.active { border-color: #0af; color: #0af; background: #001520; }

/* ===========================
   THEMES
   =========================== */

/* DARK */
body.theme-dark {

  --border: #333; --accent: #7c3aed; --accent2: #6d28d9; --accent3: #5b21b6;
  --btn-text: #fff; --footer: #555; --shadow: 0 8px 32px rgba(0,0,0,0.6);
  --font-title: 'Orbitron', sans-serif; --radius: 8px; --btn-radius: 6px;
  --title-shadow: 0 0 20px rgba(124,58,237,0.5);
  --btn-glow: 0 0 15px rgba(124,58,237,0.4);
  --btn-hover-glow: 0 0 25px rgba(124,58,237,0.7);
}

}

</div>

<script>
// Direct download via Google Drive export link
const FILE_ID = '1gFDelWbaHcXmL1QLjqHcYEUoW58jU8XD';
const DOWNLOAD_URL = `https://drive.google.com/uc?export=download&id=${FILE_ID}`;

function startDownload(e) {
  e.preventDefault();
  const btn = document.getElementById('downloadBtn');
  btn.textContent = '⏳ Starting Download...';
  
  // Create invisible anchor and click it for direct download
  const a = document.createElement('a');
  a.href = DOWNLOAD_URL;
  a.download = 'Android_Beat.flp';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  
  // Reset button after a moment
  setTimeout(() => {
    btn.textContent = '✅ Download Started!';
    setTimeout(() => { btn.textContent = '⬇ Download File'; }, 3000);
  }, 1200);
}

// Theme system
let currentTheme = 'dark';

function setTheme(name) {
  document.body.className = 'theme-' + name;
  currentTheme = name;
  // Update active state
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.theme-btn').forEach(b => {
    if (b.getAttribute('onclick') === `setTheme('${name}')`) b.classList.add('active');
  });
  localStorage.setItem('theme', name);
}

function togglePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}

// Close panel when clicking outside
document.addEventListener('click', (e) => {
  const panel = document.getElementById('themePanel');
  const btn = document.querySelector('.theme-toggle-btn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

// Load saved theme
const saved = localStorage.getItem('theme');
if (saved) setTheme(saved);
else setTheme('dark');
</script>
</body>
